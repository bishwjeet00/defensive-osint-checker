<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defensive OSINT Checker | Personal Security Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    .result-card { transition: all 0.3s; }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <!-- Header -->
    <div class="text-center py-8">
      <h1 class="text-4xl font-bold mb-2">🛡️ Defensive OSINT Checker</h1>
      <p class="text-lg text-gray-600 dark:text-gray-400">Personal use tool for checking public exposures</p>
      <div class="mt-4 inline-flex items-center bg-amber-100 dark:bg-amber-900 text-amber-800 dark:text-amber-200 px-4 py-2 rounded-full text-sm">
        <i class="fas fa-exclamation-triangle mr-2"></i>
        For defensive & educational purposes only
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-300 dark:border-gray-700 mb-8 overflow-x-auto">
      <button onclick="switchTab(0)" class="tab px-6 py-3 tab-active font-medium" data-tab="0">Email</button>
      <button onclick="switchTab(1)" class="tab px-6 py-3 font-medium" data-tab="1">Username</button>
      <button onclick="switchTab(2)" class="tab px-6 py-3 font-medium" data-tab="2">Domain</button>
      <button onclick="switchTab(3)" class="tab px-6 py-3 font-medium" data-tab="3">Image Metadata</button>
    </div>

    <!-- Search Forms -->
    <div id="forms">
      <!-- Email Form -->
      <div id="form-0" class="tab-content">
        <input type="email" id="email-input" placeholder="your@email.com" class="w-full p-4 rounded-xl border border-gray-300 dark:border-gray-700 focus:outline-none focus:border-blue-500 text-lg">
      </div>
      <!-- Username Form -->
      <div id="form-1" class="tab-content hidden">
        <input type="text" id="username-input" placeholder="username" class="w-full p-4 rounded-xl border border-gray-300 dark:border-gray-700 focus:outline-none focus:border-blue-500 text-lg">
      </div>
      <!-- Domain Form -->
      <div id="form-2" class="tab-content hidden">
        <input type="text" id="domain-input" placeholder="example.com" class="w-full p-4 rounded-xl border border-gray-300 dark:border-gray-700 focus:outline-none focus:border-blue-500 text-lg">
      </div>
      <!-- Image Form -->
      <div id="form-3" class="tab-content hidden">
        <div class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl p-8 text-center">
          <input type="file" id="image-upload" accept="image/*" class="hidden">
          <button onclick="document.getElementById('image-upload').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-medium">
            <i class="fas fa-upload mr-2"></i> Upload Image for Metadata Analysis
          </button>
          <p class="text-sm text-gray-500 mt-4">Supports JPG, PNG – EXIF data will be extracted locally</p>
        </div>
      </div>
    </div>

    <button onclick="performSearch()" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition">
      <i class="fas fa-search mr-2"></i> Start Secure OSINT Check
    </button>

    <!-- Results -->
    <div id="results" class="mt-10"></div>

    <!-- Disclaimer -->
    <div class="mt-16 text-xs text-gray-500 dark:text-gray-400 text-center border-t pt-8">
      This tool uses public APIs responsibly. It does not store any data. Always verify results manually. Respect privacy laws.
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defensive OSINT Checker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      margin: 0;
      padding: 0;
    }
    .container { max-width: 820px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 2.2rem; }
    .card {
      background: #1f1f1f;
      border-radius: 16px;
      padding: 24px;
      margin: 16px 0;
      border: 1px solid #333;
    }
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #333;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    .tab {
      padding: 14px 24px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.05rem;
      cursor: pointer;
      white-space: nowrap;
      flex: 1;
      text-align: center;
    }
    .tab-active {
      color: #3b82f6;
      border-bottom: 4px solid #3b82f6;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 16px;
      background: #111;
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
    }
    button {
      width: 100%;
      padding: 18px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 12px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .hidden { display: none !important; }
    a.tool-link {
      display: block;
      padding: 14px;
      background: #111;
      margin-bottom: 10px;
      border-radius: 10px;
      color: #60a5fa;
      text-decoration: none;
    }
    a.tool-link:hover {
      background: #1a1a1a;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text-center py-8">
      <h1>🛡️ Defensive OSINT Checker</h1>
      <p class="text-gray-400 mt-2">Personal use tool for checking public exposures</p>
      <div class="inline-block mt-4 bg-amber-900 text-amber-400 px-5 py-2 rounded-full text-sm">
        Defensive & Educational Purposes Only
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button onclick="switchTab(0)" class="tab tab-active" data-tab="0">Email</button>
      <button onclick="switchTab(1)" class="tab" data-tab="1">Username</button>
      <button onclick="switchTab(2)" class="tab" data-tab="2">Domain</button>
      <button onclick="switchTab(3)" class="tab" data-tab="3">Image</button>
    </div>

    <!-- Forms -->
    <div id="forms">
      <div id="form-0" class="tab-content">
        <input type="email" id="email-input" placeholder="your@email.com">
      </div>
      <div id="form-1" class="tab-content hidden">
        <input type="text" id="username-input" placeholder="username">
      </div>
      <div id="form-2" class="tab-content hidden">
        <input type="text" id="domain-input" placeholder="example.com">
      </div>
      <div id="form-3" class="tab-content hidden">
        <div onclick="document.getElementById('image-upload').click()" 
             style="border: 2px dashed #555; padding: 50px 20px; text-align: center; border-radius: 16px; cursor: pointer;">
          <i class="fas fa-upload text-6xl mb-4 text-gray-500"></i>
          <p class="text-lg">Tap to upload image for metadata analysis</p>
          <input type="file" id="image-upload" accept="image/*" class="hidden">
        </div>
      </div>
    </div>

    <button onclick="performSearch()">🚀 Start Secure OSINT Check</button>

    <div id="results" class="mt-10"></div>

    <div class="text-center text-xs text-gray-500 mt-16">
      This tool uses public sources responsibly.<br>
      It does not store any data. Always verify results manually.
    </div>
  </div>

  <script>
    let currentTab = 0;

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('tab-active', i === tab);
      });
      document.querySelectorAll('.tab-content').forEach((f, i) => {
        f.classList.toggle('hidden', i !== tab);
      });
    }

    async function performSearch() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<div class="card text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><p class="mt-6">Processing...</p></div>`;

      try {
        let query = '';
        let type = '';

        switch(currentTab) {
          case 0:
            query = document.getElementById('email-input').value.trim();
            type = 'email';
            if (!query) throw new Error("Please enter an email address");
            break;
          case 1:
            query = document.getElementById('username-input').value.trim();
            type = 'username';
            if (!query) throw new Error("Please enter a username");
            break;
          case 2:
            query = document.getElementById('domain-input').value.trim();
            type = 'domain';
            if (!query) throw new Error("Please enter a domain");
            break;
          case 3:
            const file = document.getElementById('image-upload').files[0];
            if (!file) throw new Error("Please select an image");
            await handleImage(file);
            return;
        }

        showResults(query, type, resultsDiv);

      } catch (err) {
        showError(resultsDiv, err.message);
      }
    }

    function showResults(query, type, resultsDiv) {
      resultsDiv.innerHTML = `
        <div class="card">
          <h2 style="font-size:1.6rem; margin-bottom:16px;">Results for: <span style="color:#60a5fa">${query}</span></h2>
          
          <div style="margin-top:16px;">
            <p style="margin-bottom:12px; color:#aaa;">Recommended OSINT Tools:</p>
            <a href="https://haveibeenpwned.com/" target="_blank" class="tool-link">→ Have I Been Pwned</a>
            <a href="https://intelx.io/" target="_blank" class="tool-link">→ Intelligence X</a>
            <a href="https://osint.industries/" target="_blank" class="tool-link">→ OSINT Industries</a>
            <a href="https://www.google.com/search?q=${encodeURIComponent(query)}" target="_blank" class="tool-link">→ Google Search</a>
          </div>
        </div>`;
    }

    async function handleImage(file) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<div class="card text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><p>Analyzing image...</p></div>`;

      const metadata = {
        Filename: file.name,
        Size: (file.size / 1024).toFixed(2) + " KB",
        Type: file.type,
        LastModified: new Date(file.lastModified).toLocaleString()
      };

      resultsDiv.innerHTML = `
        <div class="card">
          <h2 style="font-size:1.6rem; margin-bottom:16px;">📸 Image Metadata</h2>
          <pre style="background:#111; padding:20px; border-radius:12px; overflow:auto; font-size:0.95rem;">${JSON.stringify(metadata, null, 2)}</pre>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
            <a href="https://www.google.com/searchbyimage?image_url=${URL.createObjectURL(file)}" target="_blank" style="background:#2563eb; color:white; padding:16px; text-align:center; border-radius:12px; text-decoration:none;">Google Lens</a>
            <a href="https://tineye.com/" target="_blank" style="background:#2563eb; color:white; padding:16px; text-align:center; border-radius:12px; text-decoration:none;">TinEye</a>
          </div>
        </div>`;
    }

    function showError(container, message) {
      container.innerHTML = `
        <div class="card" style="border-color:#ef4444;">
          <p style="color:#f87171; font-size:1.1rem;">⚠️ ${message}</p>
          <button onclick="location.reload()" style="margin-top:16px; background:#444; padding:12px 24px; border-radius:8px;">Try Again</button>
        </div>`;
    }

    // Initialize
    window.onload = () => switchTab(0);
  </script>
</body>
</html>
